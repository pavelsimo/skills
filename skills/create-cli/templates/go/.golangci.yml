version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - gosec
    - revive
    - gocritic
    - misspell
    - unused
    - gocyclo
    - ineffassign
    - bodyclose
    - nilerr
    - goconst
    - prealloc
    - unparam
    - whitespace
  settings:
    gocyclo:
      min-complexity: 50
    goconst:
      min-len: 3
      min-occurrences: 3
    revive:
      rules:
        - name: exported
          arguments:
            - disableStutteringCheck
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
